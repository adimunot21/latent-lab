# Pre-commit hooks for latent-lab.
#
# Python hooks (ruff, mypy) are self-contained. The web hooks (eslint,
# prettier) are `language: system` and shell out to the project's npm scripts,
# so they require Node on PATH — activate the toolchain env first:
#   conda activate latent-lab-node
# CI runs all of these independently regardless of the local hook setup.
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: mixed-line-ending

  # Python: lint + format (Ruff). Fast, no project venv needed.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        name: ruff (lint)
        args: ["--fix"]
        files: ^training/
      - id: ruff-format
        name: ruff (format)
        files: ^training/

  # Python: static types (mypy) via the training uv env.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (training)
        entry: bash -c 'cd training && uv run mypy src'
        language: system
        types: [python]
        files: ^training/src/
        pass_filenames: false

      # Web: eslint + prettier via the project's npm scripts (needs Node on PATH).
      - id: web-eslint
        name: eslint (web)
        entry: bash -c 'cd web && npx eslint .'
        language: system
        files: ^web/
        types_or: [ts, javascript, svelte]
        pass_filenames: false
      - id: web-prettier
        name: prettier (web)
        entry: bash -c 'cd web && npx prettier --check .'
        language: system
        files: ^web/
        pass_filenames: false
