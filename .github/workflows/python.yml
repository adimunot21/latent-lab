name: python

on:
  push:
    branches: [main]
    paths: ["training/**", ".github/workflows/python.yml"]
  pull_request:
    paths: ["training/**", ".github/workflows/python.yml"]

defaults:
  run:
    working-directory: training

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "training/uv.lock"

      - name: Sync deps (CPU torch — no GPU on CI runners)
        run: uv sync --frozen --extra cpu --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest
